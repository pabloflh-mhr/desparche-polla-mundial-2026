name: Actualizar JSON Automaticamente

on:
  schedule:
    - cron: '0 * * * *' # cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-archivo:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Restaurar perfil Playwright
        uses: actions/cache@v4
        with:
          path: playwright_profile
          key: playwright-profile-${{ runner.os }}
          restore-keys: |
            playwright-profile-${{ runner.os }}


      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip

          pip install playwright
          pip install requests

          playwright install chromium


      - name: Ejecutar scraper
        env:
          CI: true
        run: |
          python scraper_polla.py


      - name: Verificar cambios
        run: |
          git status


      - name: Commit y subir JSON actualizado
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add datos.json

          git commit -m "Actualizacion automatica JSON [skip ci]" || echo "Sin cambios"

          git push
